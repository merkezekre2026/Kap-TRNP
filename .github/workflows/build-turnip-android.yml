name: Build Turnip Android

on:
  workflow_dispatch:
    inputs:
      mesa_ref:
        description: Mesa branch, tag, or commit to build
        required: false
        default: main
      android_api:
        description: Android API level
        required: false
        default: "26"
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Turnip for Android arm64
    runs-on: ubuntu-latest

    env:
      ANDROID_ABI: arm64-v8a
      ANDROID_API: ${{ inputs.android_api || '26' }}
      MESA_REF: ${{ inputs.mesa_ref || 'main' }}
      WORK_DIR: ${{ github.workspace }}/work

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d
          add-to-path: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            bison \
            flex \
            git \
            glslang-tools \
            libdrm-dev \
            ninja-build \
            pkg-config \
            python3-mako \
            python3-pip \
            python3-yaml \
            zip
          python3 -m pip install --user --break-system-packages meson
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build Turnip
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
        run: scripts/build-turnip-android.sh

      - name: Upload Turnip artifact
        uses: actions/upload-artifact@v4
        with:
          name: turnip-android-arm64
          path: |
            work/artifacts/libvulkan_freedreno.so
            work/artifacts/turnip-adrenotools-arm64-v8a.zip
          if-no-files-found: error
